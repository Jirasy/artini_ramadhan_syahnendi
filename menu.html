<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Galaxy Defenders</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="menu.css">
</head>
<body class="h-full bg-slate-950 text-white overflow-hidden">

  <div class="stars" aria-hidden="true"></div>

  <div class="relative h-full w-full flex flex-col items-center justify-center p-4 overflow-y-auto">
    <div class="menu-card slide-in rounded-2xl p-6 md:p-10 max-w-md w-full mx-auto my-auto">

      <h1 class="game-title text-3xl md:text-5xl font-black text-center mb-2 glow-text text-cyan-400">
        GALAXY DEFENDERS
      </h1>
      <p class="text-center text-slate-400 mb-8 text-sm md:text-base">
        Pertahankan galaksi dari invasi alien!
      </p>

      <!-- Level -->
      <div class="mb-6">
        <h3 class="text-lg font-bold mb-3 text-slate-300">🎯 Pilih Level</h3>
        <div class="grid grid-cols-3 gap-2">
          <button data-level="easy"
            class="level-btn selected bg-green-600 hover:bg-green-500 text-white py-3 px-4 rounded-lg font-bold text-sm md:text-base border-2 border-green-400">
            Mudah
          </button>
          <button data-level="medium"
            class="level-btn bg-yellow-600 hover:bg-yellow-500 text-white py-3 px-4 rounded-lg font-bold text-sm md:text-base border-2 border-transparent">
            Sedang
          </button>
          <button data-level="hard"
            class="level-btn bg-red-600 hover:bg-red-500 text-white py-3 px-4 rounded-lg font-bold text-sm md:text-base border-2 border-transparent">
            Sulit
          </button>
        </div>
      </div>

      <!-- Ship Color -->
      <div class="mb-6">
        <h3 class="text-lg font-bold mb-3 text-slate-300">🚀 Warna Pesawat</h3>
        <div class="flex justify-center gap-3 flex-wrap">
          <div data-color="#00ffff" class="color-option selected w-10 h-10 md:w-12 md:h-12 rounded-full border-4 border-white"        style="background:#00ffff;"></div>
          <div data-color="#ff00ff" class="color-option           w-10 h-10 md:w-12 md:h-12 rounded-full border-4 border-transparent" style="background:#ff00ff;"></div>
          <div data-color="#00ff00" class="color-option           w-10 h-10 md:w-12 md:h-12 rounded-full border-4 border-transparent" style="background:#00ff00;"></div>
          <div data-color="#ffff00" class="color-option           w-10 h-10 md:w-12 md:h-12 rounded-full border-4 border-transparent" style="background:#ffff00;"></div>
          <div data-color="#ff6600" class="color-option           w-10 h-10 md:w-12 md:h-12 rounded-full border-4 border-transparent" style="background:#ff6600;"></div>
          <div data-color="#ffffff" class="color-option           w-10 h-10 md:w-12 md:h-12 rounded-full border-4 border-transparent" style="background:#ffffff;"></div>
        </div>
      </div>

      <!-- Bullet Color -->
      <div class="mb-8">
        <h3 class="text-lg font-bold mb-3 text-slate-300">💥 Warna Peluru</h3>
        <div class="flex justify-center gap-3 flex-wrap">
          <div data-bullet-color="#ff0000" class="bullet-color-option selected w-8 h-8 md:w-10 md:h-10 rounded-lg border-4 border-white"        style="background:#ff0000;"></div>
          <div data-bullet-color="#00ffff" class="bullet-color-option           w-8 h-8 md:w-10 md:h-10 rounded-lg border-4 border-transparent" style="background:#00ffff;"></div>
          <div data-bullet-color="#ffff00" class="bullet-color-option           w-8 h-8 md:w-10 md:h-10 rounded-lg border-4 border-transparent" style="background:#ffff00;"></div>
          <div data-bullet-color="#00ff00" class="bullet-color-option           w-8 h-8 md:w-10 md:h-10 rounded-lg border-4 border-transparent" style="background:#00ff00;"></div>
          <div data-bullet-color="#ff00ff" class="bullet-color-option           w-8 h-8 md:w-10 md:h-10 rounded-lg border-4 border-transparent" style="background:#ff00ff;"></div>
        </div>
      </div>

      <!-- Start -->
      <button id="startBtn"
        class="btn-glow pulse-animation w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white py-4 px-8 rounded-xl font-bold text-xl md:text-2xl game-title tracking-wider">
        MULAI GAME
      </button>

      <div class="mt-6 text-center text-slate-400 text-xs md:text-sm">
        <p class="mb-1">💻 PC: Arrow Keys / WASD + Space</p>
        <p>📱 Mobile: Gunakan tombol sentuh di layar game</p>
      </div>
    </div>
  </div>

  <script src="menu.js"></script>
</body>
</html>
