<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Balance Tower</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="bt.css">
  <link rel="stylesheet" href="bt2.css">
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div id="gameContainer">
   <canvas id="gameCanvas"></canvas><!-- HUD -->
   <div id="hud" class="hud" style="display: none;">
    <div class="hud-item">
     <div class="hud-label">
      SCORE
     </div>
     <div id="scoreDisplay" class="hud-value hud-score">
      0
     </div>
    </div>
    <div class="hud-item">
     <div class="hud-label">
      BEST
     </div>
     <div id="bestDisplay" class="hud-value hud-best">
      0
     </div>
    </div><button id="pauseBtn" class="hud-item pause-btn">⏸️</button>
   </div><!-- Tap Hint -->
   <div id="tapHint">
    👆 Tap to drop block!
   </div><!-- Start Screen -->
   <div id="startScreen" class="screen active">
    <div class="screen-content">
     <div class="emoji">
      🏗️
     </div>
     <h1 class="title">Balance Tower</h1>
     <p class="subtitle">Stack blocks as high as you can!</p><button id="playBtn" class="btn">▶ PLAY</button>
     <div class="badge"><span style="color: #94a3b8; font-size: 13px;">🏆 Best: </span> <span id="startBest" class="hud-value hud-best" style="font-size: 18px;">0</span>
     </div>
    </div>
   </div><!-- Pause Screen -->
   <div id="pauseScreen" class="screen">
    <div class="screen-content">
     <div class="emoji">
      ⏸️
     </div>
     <h2 class="title" style="color: #38bdf8;">PAUSED</h2>
     <p class="subtitle">Game paused</p>
     <div class="button-group"><button id="resumeBtn" class="btn">▶ RESUME</button> <button id="quitBtn" class="btn btn-secondary">🏠 HOME</button>
     </div>
    </div>
   </div><!-- Game Over Screen -->
   <div id="gameOverScreen" class="screen">
    <div class="screen-content">
     <div class="emoji">
      💥
     </div>
     <h2 class="title" style="color: #f87171;">Tower Fell!</h2>
     <p class="subtitle">Your tower reached</p>
     <div class="badge">
      <div id="finalScore" class="badge-value">
       0
      </div>
      <div class="badge-label">
       BLOCKS
      </div>
     </div>
     <div id="newBestBadge" class="new-best" style="display: none;">
      🎉 NEW BEST!
     </div>
     <div id="bestScoreLine" style="color: #94a3b8; font-size: 12px; margin-bottom: 24px;">
      Best: <span id="overBest" style="color: #38bdf8; font-weight: 700;">0</span>
     </div><button id="retryBtn" class="btn">🔄 TRY AGAIN</button>
    </div>
   </div>
  </div>
  <script src="bt.js"></script>
 <script src="bt2.js"></script>
</body>
</html>
