<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Galaxy Defenders - Game</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="game.css">
</head>
<body class="h-full bg-slate-950 text-white overflow-hidden">

  <div id="app" class="relative h-full w-full flex flex-col">

    <!-- ── Game Screen ──────────────────────────────────────────────────── -->
    <div id="gameScreen" class="h-full w-full flex flex-col">

      <!-- HUD -->
      <div class="flex justify-between items-center px-3 py-2 md:px-4 md:py-3 bg-slate-900/80 backdrop-blur-sm border-b border-slate-700 shrink-0">
        <div class="flex items-center gap-3 md:gap-4">
          <div class="text-sm md:text-base">
            <span class="text-slate-400">Skor:</span>
            <span id="scoreDisplay" class="font-bold text-cyan-400 ml-1">0</span>
          </div>
          <div class="text-sm md:text-base">
            <span class="text-slate-400">Wave:</span>
            <span id="waveDisplay" class="font-bold text-yellow-400 ml-1">1</span>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-slate-400 text-sm md:text-base">Nyawa:</span>
          <div id="livesDisplay" class="flex gap-1"></div>
        </div>
        <button id="pauseBtn" class="bg-slate-700 hover:bg-slate-600 active:bg-slate-500 p-2 rounded-lg text-lg leading-none" aria-label="Pause">⏸️</button>
      </div>

      <!-- Canvas area -->
      <div class="flex-1 flex items-center justify-center bg-slate-950 overflow-hidden">
        <canvas id="gameCanvas"></canvas>
      </div>

      <!-- Mobile Controls -->
      <div id="mobileControls" class="shrink-0 md:hidden bg-slate-900/90 backdrop-blur-sm border-t border-slate-700">
        <div class="flex justify-between items-center max-w-lg mx-auto p-3">
          <div class="flex gap-2">
            <button id="leftBtn"  class="control-btn bg-slate-700 active:bg-slate-500 w-16 h-16 rounded-xl text-2xl flex items-center justify-center select-none" aria-label="Kiri">◀️</button>
            <button id="rightBtn" class="control-btn bg-slate-700 active:bg-slate-500 w-16 h-16 rounded-xl text-2xl flex items-center justify-center select-none" aria-label="Kanan">▶️</button>
          </div>
          <button id="fireBtn" class="control-btn bg-red-600 active:bg-red-400 w-20 h-20 rounded-full text-2xl font-bold flex items-center justify-center border-4 border-red-400 select-none" aria-label="Tembak">🔥</button>
        </div>
      </div>
    </div>

    <!-- ── Pause Screen ──────────────────────────────────────────────────── -->
    <div id="pauseScreen" class="overlay hidden">
      <div class="overlay-card slide-in">
        <h2 class="game-title text-3xl md:text-4xl font-black mb-6 text-yellow-400">PAUSE</h2>
        <button id="resumeBtn"  class="overlay-btn bg-green-600  hover:bg-green-500">▶️ Lanjutkan</button>
        <button id="restartBtn" class="overlay-btn bg-yellow-600 hover:bg-yellow-500">🔄 Mulai Ulang</button>
        <button id="menuBtn"    class="overlay-btn bg-slate-600  hover:bg-slate-500">🏠 Menu Utama</button>
      </div>
    </div>

    <!-- ── Game Over Screen ──────────────────────────────────────────────── -->
    <div id="gameOverScreen" class="overlay hidden">
      <div class="overlay-card slide-in text-center">
        <h2 class="game-title text-3xl md:text-4xl font-black mb-2 text-red-500">GAME OVER</h2>
        <p class="text-slate-400 mb-6 text-sm">Galaksi telah jatuh ke tangan alien!</p>
        <div class="bg-slate-800 rounded-xl p-4 mb-6">
          <p class="text-slate-400 mb-1 text-sm">Skor Akhir</p>
          <p id="finalScore" class="text-4xl font-black text-cyan-400 game-title">0</p>
          <p class="text-slate-400 mt-2 text-sm">Wave Terakhir: <span id="finalWave" class="text-yellow-400 font-bold">1</span></p>
        </div>
        <button id="playAgainBtn"  class="overlay-btn bg-cyan-600  hover:bg-cyan-500">🎮 Main Lagi</button>
        <button id="backToMenuBtn" class="overlay-btn bg-slate-600 hover:bg-slate-500">🏠 Menu Utama</button>
      </div>
    </div>

    <!-- ── Victory Screen ───────────────────────────────────────────────── -->
    <div id="victoryScreen" class="overlay hidden">
      <div class="overlay-card slide-in text-center">
        <h2 class="game-title text-3xl md:text-4xl font-black mb-2 text-green-400 glow-text">VICTORY!</h2>
        <p class="text-slate-400 mb-6 text-sm">🎉 Kamu berhasil menyelamatkan galaksi! 🎉</p>
        <div class="bg-slate-800 rounded-xl p-4 mb-6">
          <p class="text-slate-400 mb-1 text-sm">Skor Akhir</p>
          <p id="victoryScore" class="text-4xl font-black text-cyan-400 game-title">0</p>
        </div>
        <button id="victoryPlayAgainBtn" class="overlay-btn bg-cyan-600  hover:bg-cyan-500">🎮 Main Lagi</button>
        <button id="victoryMenuBtn"      class="overlay-btn bg-slate-600 hover:bg-slate-500">🏠 Menu Utama</button>
      </div>
    </div>

  </div><!-- #app -->

  <script src="game.js"></script>
</body>
</html>
