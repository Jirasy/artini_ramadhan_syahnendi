<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Breakout Game</title>
  <link rel="stylesheet" href="breakout.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <h1>Breakout / Brick Breaker</h1>

  <!-- Menu awal -->
  <div id="menu">
    <h2>Pilih Warna Paddle & Bola</h2>
    <label>Paddle:</label>
    <input type="color" id="paddleColor" value="#00ff00"><br><br>
    <label>Bola:</label>
    <input type="color" id="ballColor" value="#ffff00"><br><br>
    <button onclick="startGame()">Mulai Game</button>
  </div>

  <!-- Canvas game -->
  <canvas id="gameCanvas" style="display:none;"></canvas>
  <p id="controls" style="display:none;">Controls: Arrow Keys (PC) | Tombol Virtual / Swipe (HP)</p>

  <!-- Tombol Virtual (muncul hanya di HP) -->
  <div class="controls" style="display:none;">
    <button onclick="move(" LEFT")">⬅️</button>
    <button onclick="move(" RIGHT")">➡️</button>
  </div>

  <script src="breakout.js"></script>
</body>

</html>
