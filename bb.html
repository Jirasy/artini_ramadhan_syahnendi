     <div id="pieces-tray" class="flex items-center justify-center gap-3 md:gap-5 p-2 min-h-[80px]"></div>
    </div><!-- Mode indicator -->
    <div id="mode-indicator" class="text-center text-[10px] uppercase tracking-widest text-slate-600 pb-2"></div>
   </div><!-- LEADERBOARD SCREEN -->
   <div id="leaderboard-screen" class="h-full w-full flex flex-col hidden">
    <div class="flex items-center gap-3 px-4 py-3 bg-slate-800/80 border-b border-slate-700/50"><button onclick="showMenu()" class="btn-press p-2 rounded-xl text-slate-400 hover:text-white hover:bg-slate-700"><i data-lucide="arrow-left" style="width:20px;height:20px;"></i></button>
     <h2 class="text-lg font-bold text-white flex items-center gap-2"><i data-lucide="trophy" style="width:20px;height:20px;color:#fbbf24;"></i> Leaderboard</h2>
    </div>
    <div class="flex gap-2 px-4 pt-3"><button onclick="filterLeaderboard('all')" id="filter-all" class="btn-press px-4 py-1.5 rounded-full text-xs font-bold bg-amber-500 text-white">All</button> <button onclick="filterLeaderboard('endless')" id="filter-endless" class="btn-press px-4 py-1.5 rounded-full text-xs font-bold bg-slate-700 text-slate-300">Endless</button> <button onclick="filterLeaderboard('challenge')" id="filter-challenge" class="btn-press px-4 py-1.5 rounded-full text-xs font-bold bg-slate-700 text-slate-300">Challenge</button>
    </div>
    <div id="leaderboard-list" class="flex-1 overflow-auto p-4 space-y-2"></div>
   </div><!-- GAME OVER OVERLAY -->
   <div id="game-over" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden game-over-overlay">
    <div class="bg-slate-800 rounded-3xl p-6 mx-4 w-full max-w-sm text-center border border-slate-700 shadow-2xl screen-fade">
     <div class="text-5xl mb-3">
      💥
     </div>
     <h2 class="text-2xl font-black text-white mb-1">Game Over!</h2>
     <div class="text-4xl font-black text-amber-400 my-3" id="final-score">
      0
     </div>
     <div class="text-slate-400 text-sm mb-1" id="final-lines">
      Lines: 0
     </div>
     <div class="text-slate-500 text-xs mb-5" id="final-time"></div>
     <div class="flex flex-col gap-2"><button onclick="restartGame()" class="btn-press w-full py-3 rounded-2xl font-bold text-white bg-gradient-to-r from-emerald-500 to-teal-600 shadow-lg">Play Again</button> <button onclick="gameOverToMenu()" class="btn-press w-full py-3 rounded-2xl font-bold text-slate-300 bg-slate-700 hover:bg-slate-600">Menu</button>
